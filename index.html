<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mineradio - Private Visual Radio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .diagonal-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(
                    135deg,
                    transparent,
                    transparent 80px,
                    rgba(40, 60, 55, 0.03) 80px,
                    rgba(40, 60, 55, 0.03) 82px
                ),
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 80px,
                    rgba(40, 60, 55, 0.02) 80px,
                    rgba(40, 60, 55, 0.02) 82px
                );
            pointer-events: none;
            z-index: 0;
        }

        .diagonal-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .diagonal-line {
            position: absolute;
            width: 300%;
            height: 1px;
            background: rgba(80, 100, 95, 0.08);
            transform-origin: left center;
        }

        .line-1 { transform: rotate(15deg); top: 10%; left: -50%; }
        .line-2 { transform: rotate(15deg); top: 25%; left: -50%; }
        .line-3 { transform: rotate(15deg); top: 40%; left: -50%; }
        .line-4 { transform: rotate(15deg); top: 55%; left: -50%; }
        .line-5 { transform: rotate(15deg); top: 70%; left: -50%; }
        .line-6 { transform: rotate(15deg); top: 85%; left: -50%; }
        
        .line-7 { transform: rotate(-10deg); top: 5%; left: -100%; }
        .line-8 { transform: rotate(-10deg); top: 30%; left: -100%; }
        .line-9 { transform: rotate(-10deg); top: 55%; left: -100%; }
        .line-10 { transform: rotate(-10deg); top: 80%; left: -100%; }

        .noise-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.02;
            pointer-events: none;
            z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .logo {
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 400;
            letter-spacing: -0.03em;
            margin-bottom: 30px;
            animation: fadeInUp 1.2s ease-out;
            position: relative;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo span {
            display: inline-block;
        }

        .logo-1 { color: #ffffff; }
        .logo-2 { color: #ffffff; }
        .logo-3 { color: #ffffff; }
        .logo-4 { color: #ffffff; }
        .logo-5 { color: #8fa89f; }
        .logo-6 { color: #a8b8b0; }
        .logo-7 { color: #98a8a0; }
        .logo-8 { color: #c4b896; }
        .logo-9 { color: #d4c8a8; }

        .subtitle {
            font-size: 0.9rem;
            letter-spacing: 0.4em;
            color: rgba(120, 140, 135, 0.6);
            text-transform: uppercase;
            margin-bottom: 60px;
            animation: fadeInUp 1.2s ease-out 0.3s both;
            position: relative;
        }

        .subtitle::before,
        .subtitle::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 60px;
            height: 1px;
            background: rgba(80, 100, 95, 0.4);
            transform: translateY(-50%);
        }

        .subtitle::before { left: -80px; }
        .subtitle::after { right: -80px; }

        .download-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            animation: fadeInUp 1.2s ease-out 0.6s both;
        }

        .main-download-btn {
            padding: 18px 50px;
            background: transparent;
            border: 1px solid rgba(140, 170, 160, 0.3);
            color: rgba(200, 220, 210, 0.9);
            font-size: 1rem;
            letter-spacing: 0.15em;
            cursor: default;
        }

        .main-download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .platform-buttons {
            display: flex;
            gap: 20px;
        }

        .platform-btn {
            padding: 14px 32px;
            background: transparent;
            border: 1px solid rgba(80, 100, 95, 0.2);
            color: rgba(120, 140, 135, 0.7);
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .platform-btn:hover {
            border-color: rgba(140, 170, 160, 0.4);
            color: rgba(200, 220, 210, 0.9);
            background: rgba(140, 170, 160, 0.03);
        }

        .platform-btn i {
            font-size: 16px;
            opacity: 0.6;
            transition: opacity 0.4s ease;
        }

        .platform-btn:hover i {
            opacity: 0.9;
        }

        .app-showcase {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 800px;
            height: 35%;
            opacity: 0.3;
            pointer-events: none;
            animation: fadeInBottom 1.5s ease-out 1s both;
        }

        @keyframes fadeInBottom {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(30px);
            }
            to {
                opacity: 0.3;
                transform: translateX(-50%) translateY(0);
            }
        }

        .app-window {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            border: 1px solid rgba(80, 100, 95, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            height: 30px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 8px;
        }

        .app-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(100, 120, 115, 0.4);
        }

        .app-content {
            flex: 1;
            display: flex;
            gap: 10px;
            padding: 10px;
        }

        .app-sidebar {
            width: 120px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .app-nav-item {
            height: 24px;
            background: rgba(80, 100, 95, 0.15);
            border-radius: 4px;
        }

        .app-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .app-search {
            height: 24px;
            background: rgba(80, 100, 95, 0.15);
            border-radius: 12px;
        }

        .app-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .app-card {
            background: rgba(80, 100, 95, 0.1);
            border-radius: 6px;
        }

        .app-player {
            height: 36px;
            background: rgba(80, 100, 95, 0.1);
            border-radius: 4px;
            margin-top: auto;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(60, 80, 75, 0.4);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            z-index: 1;
        }

        .mac-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .mac-modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .mac-modal {
            background: #111;
            border: 1px solid rgba(140, 170, 160, 0.2);
            border-radius: 12px;
            padding: 40px;
            min-width: 320px;
            max-width: 90%;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .mac-modal-overlay.active .mac-modal {
            transform: translateY(0);
        }

        .mac-modal-title {
            font-size: 1.2rem;
            color: rgba(200, 220, 210, 0.9);
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .mac-modal-subtitle {
            font-size: 0.8rem;
            color: rgba(120, 140, 135, 0.5);
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 0.1em;
        }

        .mac-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .mac-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border: 1px solid rgba(80, 100, 95, 0.2);
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .mac-option:hover {
            border-color: rgba(140, 170, 160, 0.4);
            background: rgba(140, 170, 160, 0.05);
        }

        .mac-option-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .mac-option-icon {
            font-size: 24px;
            color: rgba(140, 170, 160, 0.8);
        }

        .mac-option-name {
            color: rgba(200, 220, 210, 0.9);
            font-size: 0.9rem;
            margin-bottom: 3px;
        }

        .mac-option-desc {
            color: rgba(120, 140, 135, 0.5);
            font-size: 0.75rem;
        }

        .mac-option-arrow {
            color: rgba(120, 140, 135, 0.4);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .mac-option:hover .mac-option-arrow {
            color: rgba(200, 220, 210, 0.8);
            transform: translateX(3px);
        }

        .mac-modal-close {
            display: block;
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid rgba(80, 100, 95, 0.2);
            color: rgba(120, 140, 135, 0.6);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .mac-modal-close:hover {
            border-color: rgba(140, 170, 160, 0.3);
            color: rgba(200, 220, 210, 0.8);
        }



        @media (max-width: 768px) {
            .logo {
                font-size: clamp(3rem, 18vw, 6rem);
                letter-spacing: -0.02em;
                margin-bottom: 20px;
            }

            .subtitle {
                font-size: 0.75rem;
                letter-spacing: 0.3em;
                margin-bottom: 40px;
            }

            .subtitle::before,
            .subtitle::after {
                width: 30px;
            }

            .subtitle::before { left: -45px; }
            .subtitle::after { right: -45px; }

            .main-download-btn {
                padding: 14px 35px;
                font-size: 0.9rem;
            }

            .platform-buttons {
                flex-direction: column;
                gap: 12px;
            }

            .platform-btn {
                padding: 12px 24px;
                font-size: 0.8rem;
            }

            .app-showcase {
                display: none;
            }

            .footer {
                font-size: 0.65rem;
            }
        }
    </style>
</head>

                <div class="app-sidebar">
                    <div class="app-nav-item"></div>

            </div>
        </div>
    </div>

    <div class="mac-modal-overlay" id="macModal" onclick="hideMacModal(event)">
        <div class="mac-modal" onclick="event.stopPropagation()">
            <div class="mac-modal-title">选择 macOS 版本</div>
            <div class="mac-modal-subtitle">Select Your Mac Chip</div>
            
            <div class="mac-options">
                <a href="/download/MineRadio-macOS-arm64.dmg" class="mac-option" download>
                    <div class="mac-option-info">

                <a href="/download/MineRadio-macOS-x64.dmg" class="mac-option" download>
                    <div class="mac-option-info">

    </div>

    <div class="footer">
        © 2026 Mineradio. All rights reserved.
    </div>

    <script>
        function downloadPlatform(platform) {
            const platformNames = {
                windows: 'Windows',
                mac: 'macOS',
                android: 'Android'
            };
            alert(`正在下载 Mineradio ${platformNames[platform]} 版本...`);
        }

        function showMacModal() {
            document.getElementById('macModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function hideMacModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('macModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                hideMacModal();
            }
        });
    </script>
